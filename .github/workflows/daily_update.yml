name: 每日台股分析自動更新

# 設定觸發條件
on:
  schedule:
    # 使用 Cron 語法。台灣時間下午 2:00 (UTC時間早上 6:00) 執行，每週一到週五
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # 允許你隨時在 GitHub 網頁上手動點擊執行

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    # 1. 下載你的程式碼
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. 安裝 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    # 3. 安裝需要的套件
    - name: Install dependencies
      run: pip install -r requirements.txt

    # 4. 執行腳本，產生新的 index.html
    # (如果你的 Python 腳本有用到 API Key，可以在這裡透過 GitHub Secrets 傳入)
    - name: Run Python script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} 
      run: python generate_report.py

    # 5. 將新的 index.html 推送覆蓋回 GitHub
    - name: Commit and push changes
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "Auto-update daily stock report"
        file_pattern: index.html
